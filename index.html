<!-- 예약 신청 모달 / Booking Modal -->
<div id="modal" class="modal">
    <div class="modalBox">
        <h3>새 예약 추가 / New Booking</h3>
        <div id="selectedSlotInfo" class="selectedSlotInfo"></div>
        <div class="inputGroup">
            <input id="alliance" type="text" placeholder="연맹명 / Alliance (e.g. ZTP)" list="allianceSuggestions">
            <datalist id="allianceSuggestions"></datalist>
            <input id="player" type="text" placeholder="닉네임 / Nickname">
            <!-- 추가된 ID 입력란 -->
            <input id="playerId" type="text" placeholder="ID (숫자 9개) / Player ID (9 digits)" maxlength="9">
            <input id="daysSaved" type="number" placeholder="사용 가속(일) / Speed-up Days">
            <input id="password" type="password" placeholder="비밀번호(취소용) / Password">
        </div>
        <button type="button" onclick="confirmBooking()" class="btn-primary">예약 확정 / Confirm Booking</button>
        <button type="button" onclick="closeModal()" class="btn-secondary">닫기 / Close</button>
    </div>
</div>

<!-- 상세 관리자 패널 / Advanced Admin Panel -->
<div id="adminPanel" class="adminPanel">
    <button type="button" class="adminCloseBtn" onclick="closeAdmin()">×</button>
    <div class="adminHeader">
        <h3>서버 관리자 시스템 / Server Admin System</h3>
    </div>
    
    <div class="adminBody">
        <div class="adminSection">
            <h4><i class="icon-data"></i> 데이터 관리 / Data Management</h4>
            <div class="adminButtonGroup">
                <button onclick="exportAllCSV()" class="adminBtn excel">엑셀 추출 (Excel)</button>
                <button onclick="backupAndClearAll()" class="adminBtn clear">데이터 전체 초기화 (Reset)</button>
            </div>
        </div>

        <div class="adminSection">
            <h4><i class="icon-lock"></i> 예약 잠금 제어 / Slot Lock Control</h4>
            <div class="adminButtonGroup">
                <button onclick="setManualBooking('monday', true)" class="adminBtn open">월요일 오픈</button>
                <button onclick="setManualBooking('monday', false)" class="adminBtn lock">월요일 잠금</button>
            </div>
        </div>

        <div class="adminSection">
            <h4><i class="icon-log"></i> 시스템 로그 / System Logs</h4>
            <div id="logsBox" class="logsBox">
                <!-- 로그가 여기에 표시됩니다 -->
            </div>
        </div>
    </div>
</div>
