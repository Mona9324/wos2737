<!-- 상세 관리자 패널 (Admin Panel) 추가 -->
<div id="adminPanel" class="adminPanel">
    <button type="button" class="adminCloseBtn" onclick="closeAdmin()">×</button>
    <h3>관리자 패널 / Admin Panel</h3>
    
    <div class="adminSection">
        <h4>데이터 관리 / Data Management</h4>
        <div class="buttonRow">
            <button type="button" onclick="exportAllCSV()">전체 엑셀 출력 (Excel)</button>
            <button type="button" onclick="backupAndClearAll()">전체 데이터 초기화 (Clear)</button>
        </div>
    </div>

    <div class="adminSection">
        <h4>예약 제어 / Booking Control</h4>
        <div class="buttonRow">
            <button type="button" onclick="setManualBooking('monday', true)">월요일 열기</button>
            <button type="button" onclick="setManualBooking('monday', false)">월요일 잠금</button>
        </div>
        <p style="font-size:11px; color:gray; margin-top:5px;">* 수동으로 예약 가능 여부를 설정할 수 있습니다.</p>
    </div>

    <div class="adminSection">
        <h4>시스템 로그 / Logs</h4>
        <div id="logsBox" class="logsBox">로그를 불러오는 중...</div>
    </div>
</div>
