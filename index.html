<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>2737 SVS Booking</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="snow"></canvas>

<header>

<h1>❄ 2737 SVS Booking</h1>

<div id="countdown"></div>

</header>

<div class="tabs">

<button onclick="switchBuff('Monday (construction)')">Construction</button> <button onclick="switchBuff('Tuesday (research)')">Research</button> <button onclick="switchBuff('Thursday (training)')">Training</button>
  
</div>

<div class="slotStats">

<span class="availableDot"></span> <span id="availableCount">0</span>

<span class="reservedDot"></span> <span id="reservedCount">0</span>

</div>

  
<div id="slots" class="grid"></div>

<h2>Alliance Usage</h2>

<div id="stats"></div>

<div id="modal" class="modal">

<div class="modalBox">

<h3>Reserve Slot</h3>

<input id="alliance" placeholder="Alliance">

<input id="player" placeholder="Player">

<input id="password" type="password" placeholder="Cancel password">

<button onclick="confirmBooking()">Confirm</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="app.js"></script>

</body>
</html>
