<div class="tabs">
    <button type="button" id="tab-monday" onclick="switchBuff('monday')">
        <div class="tabTitle">월요일 (건설) / Monday</div>
        <div id="cd-monday" class="tabCD"></div>
    </button>
    <button type="button" id="tab-tuesday" onclick="switchBuff('tuesday')">
        <div class="tabTitle">화요일 (연구) / Tuesday</div>
        <div id="cd-tuesday" class="tabCD"></div>
    </button>
    <button type="button" id="tab-thursday" onclick="switchBuff('thursday')">
        <div class="tabTitle">목요일 (훈련) / Thursday</div>
        <div id="cd-thursday" class="tabCD"></div>
    </button>
</div>

<div class="adminSection">
    <p style="font-size:13px; font-weight:800;">요일별 자동 예약 설정 / Auto Schedule</p>
    <div class="autoRow">
        <span>월요일(Mon):</span>
        <input type="datetime-local" id="open-monday"> ~ <input type="datetime-local" id="close-monday">
    </div>
    <div class="autoRow">
        <span>화요일(Tue):</span>
        <input type="datetime-local" id="open-tuesday"> ~ <input type="datetime-local" id="close-tuesday">
    </div>
    <div class="autoRow">
        <span>목요일(Thu):</span>
        <input type="datetime-local" id="open-thursday"> ~ <input type="datetime-local" id="close-thursday">
    </div>
    <button type="button" onclick="saveAutoSchedule()" class="btn-primary" style="margin-top:10px; width:100%;">자동 설정 저장 / Save Schedule</button>
</div>
