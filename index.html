<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2737 SVS 국왕 버프 예약 시스템</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        window.db = firebase.firestore();
    </script>

    <style>
        /* [유저님의 기존 디자인 스타일을 여기에 유지하세요] */
        /* 아래는 스크린샷 기반으로 복구한 유저님의 기존 스타일 예시입니다. */
        :root {
            --bg-color: #1a2230;
            --card-bg: #242f42;
            --primary: #4a90e2;
            --text-main: #f5f6fa;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; }
        header { padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .notice-banner { background: #2c3e50; padding: 15px; margin: 15px; border-radius: 8px; font-size: 14px; }
        .navigation { display: flex; justify-content: space-around; padding: 10px; }
        .tab-item { background: var(--card-bg); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .tab-item.active { background: var(--primary); }
        #slots { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; }
        
        /* 모달 기본 스타일 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
            z-index: 1000; /* 기본 모달 레벨 */
        }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }

        /* [핵심 수정!!] 관리자 패널보다 알림 팝업이 위에 뜨도록 설정 */
        #adminPanel { z-index: 1100; position: relative; } /* 관리자 패널 */
        
        /* 알림, 확인, 프롬프트 모달을 최상위로 올림 */
        #alertModal, #confirmModal, #promptModal {
            z-index: 9999 !important;
        }

        .btn { padding: 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="window.handleAdminAccess()">2737 SVS BUFF BOOKING</h1>
        <div id="countdown">Next SVS Loading...</div>
    </header>

    <div class="notice-banner" id="notice-dynamic-txt">
        📢 가능한 모든 시간을 중복으로 신청해주세요.
    </div>

    <div class="navigation">
        <button class="tab-item active" id="tab-monday" onclick="window.switchBuff('monday')">월요일 (건설)</button>
        <button class="tab-item" id="tab-tuesday" onclick="window.switchBuff('tuesday')">화요일 (연구)</button>
        <button class="tab-item" id="tab-thursday" onclick="window.switchBuff('thursday')">목요일 (훈련)</button>
    </div>

    <div id="slots"></div>

    <div id="adminPanel" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h3>🛠️ 연맹 관리자 컨트롤</h3>
            <div style="display: grid; gap: 10px; margin-bottom: 20px;">
                <input type="datetime-local" id="adminBaseDate">
                <button class="btn btn-primary" onclick="window.saveAdminBaseDate()">기준일 저장</button>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <button class="btn btn-primary" onclick="window.exportAllCSV()">📊 엑셀 다운로드</button>
                <button class="btn" style="background: #5865F2; color: white;" onclick="window.exportTextAll()">📋 디스코드 텍스트 복사</button>
                <button class="btn btn-danger" onclick="window.backupAndClearAll()">⚠️ 전체 초기화</button>
            </div>
            <hr>
            <button class="btn" onclick="window.closeAdmin()">닫기</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modal-title-txt">새 예약 추가</h2>
            <div id="selectedSlotInfo" style="margin-bottom: 15px; color: #4a90e2;"></div>
            <input type="text" id="alliance" placeholder="연맹" style="width:100%; margin-bottom:10px; padding:8px;">
            <input type="text" id="player" placeholder="닉네임" style="width:100%; margin-bottom:10px; padding:8px;">
            <input type="text" id="playerId" placeholder="플레이어 ID" style="width:100%; margin-bottom:10px; padding:8px;">
            <input type="number" id="daysSaved" placeholder="가속 일수" style="width:100%; margin-bottom:10px; padding:8px;">
            <input type="password" id="cancelKey" placeholder="비밀번호" style="width:100%; margin-bottom:10px; padding:8px;">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" style="flex:1;" onclick="window.confirmBooking()">확정</button>
                <button class="btn" style="flex:1;" onclick="window.closeModal()">취on</button>
            </div>
        </div>
    </div>

    <div class="modal" id="alertModal">
        <div class="modal-content" style="text-align: center;">
            <h3 id="alert-modal-title">⚠️ 안내</h3>
            <p id="alertModalMessage"></p>
            <button class="btn btn-primary" onclick="document.getElementById('alertModal').classList.remove('show')">확인</button>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content" style="text-align: center;">
            <h3 id="confirm-modal-title">⚠️ 확인</h3>
            <p id="confirmModalMessage"></p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-danger" onclick="window.executeCustomConfirm()">확인</button>
                <button class="btn" onclick="window.closeCustomConfirm()">취소</button>
            </div>
        </div>
    </div>

    <div class="modal" id="adminLoginModal">
        <div class="modal-content">
            <h3>Admin Access</h3>
            <input type="password" id="adminLoginPwd" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn btn-primary" style="width:100%;" onclick="window.confirmAdminLogin()">Login</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
