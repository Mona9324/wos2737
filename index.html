<!-- 관리자 패널 (Admin Panel) -->
<div id="adminPanel" class="modal">
    <div class="modalBox" style="max-width: 600px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0;">관리자 시스템 / Admin System</h3>
            <button type="button" onclick="closeAdmin()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
        </div>

        <!-- 기준 시간 설정 -->
        <div class="adminSection" style="margin-bottom: 20px;">
            <p class="inputLabel">SVS 기준일 설정 / Base Date Setting</p>
            <div style="display: flex; gap: 10px;">
                <input id="adminBaseDate" type="datetime-local" style="flex: 2; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <button onclick="saveAdminBaseDate()" class="btn-primary" style="flex: 1; padding: 10px;">저장 / Save</button>
            </div>
        </div>

        <!-- 요일별 제어 -->
        <div class="adminSection" style="margin-bottom: 20px;">
            <p class="inputLabel">요일별 예약 제어 / Day Control</p>
            <div class="buttonRow" style="flex-wrap: wrap;">
                <button onclick="toggleTabStatus('monday')" id="btn-admin-monday" class="btn-secondary">월요일 / Mon</button>
                <button onclick="toggleTabStatus('tuesday')" id="btn-admin-tuesday" class="btn-secondary">화요일 / Tue</button>
                <button onclick="toggleTabStatus('thursday')" id="btn-admin-thursday" class="btn-secondary">목요일 / Thu</button>
            </div>
            <div class="buttonRow" style="margin-top: 10px;">
                <button onclick="toggleAllTabs(true)" class="btn-primary">전체 열림 / All Open</button>
                <button onclick="toggleAllTabs(false)" class="btn-danger">전체 닫힘 / All Close</button>
            </div>
        </div>

        <!-- 데이터 관리 -->
        <div class="adminSection" style="margin-bottom: 20px;">
            <p class="inputLabel">데이터 관리 / Data Management</p>
            <div class="buttonRow">
                <button onclick="exportAllCSV()" class="btn-primary" style="background: #21a366;">엑셀 추출 / Export Excel</button>
                <button onclick="backupAndClearAll()" class="btn-danger">전체 지우기 / Clear All</button>
            </div>
        </div>

        <!-- 시스템 로그 -->
        <div class="adminSection">
            <p class="inputLabel">시스템 로그 / System Logs</p>
            <div id="logsBox" style="background: #1e1e1e; color: #00ff00; padding: 10px; font-family: monospace; font-size: 11px; border-radius: 10px; height: 100px; overflow-y: auto; text-align: left;"></div>
        </div>
    </div>
</div>
