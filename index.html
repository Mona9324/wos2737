<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2737 SVS Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="snow"></canvas>
    <header>
        <h1><span id="snowSecret">❄</span> 2737 SVS Booking</h1>
        <div id="countdown" class="countdown"></div>
        <div class="creatorBadge">
            <img src="creator-dino.png" alt="Creator" class="creatorAvatar">
            <div class="creatorCredit">[ZTP] Mona (X:697 Y:445)</div>
        </div>
        <div class="headerToolbar">
            <input id="searchInput" type="text" placeholder="연맹 또는 닉네임 검색 / Search Alliance or Nickname" oninput="renderAll()">
            <select id="filterStatus" onchange="renderAll()">
                <option value="all">전체 보기 / View All</option>
                <option value="mine">내 예약 확인 / My Booking</option>
            </select>
            <button type="button" onclick="clearSearch()">초기화 / Reset</button>
        </div>
    </header>

    <section class="tabsWrap">
        <div class="tabs">
            <button type="button" id="tab-monday" onclick="switchBuff('monday')">월요일 (건설) / Monday (Construction Buff)</button>
            <button type="button" id="tab-tuesday" onclick="switchBuff('tuesday')">화요일 (연구) / Tuesday (Research Buff)</button>
            <button type="button" id="tab-thursday" onclick="switchBuff('thursday')">목요일 (훈련) / Thursday (Troops train Buff)</button>
        </div>
        <div id="bookingStatusMsg" class="bookingStatusMsgHighlight"></div>
    </section>

    <main>
        <div id="slots" class="grid"></div>
    </main>

    <!-- 예약 신청 모달 -->
    <div id="modal" class="modal">
        <div class="modalBox">
            <h3>새 예약 추가 / New Booking</h3>
            <div id="selectedSlotInfo" style="margin-bottom:10px; font-weight:bold; color:#2d3748;"></div>
            <div class="inputGroup">
                <input id="alliance" type="text" placeholder="연맹명 / Alliance (ex.ZTP,BUG,ZYZ)">
                <input id="player" type="text" placeholder="닉네임 / Nickname">
                <input id="playerId" type="text" placeholder="ID (숫자9개) / ID (9Number)" maxlength="9">
                <input id="daysSaved" type="number" placeholder="사용 가속(일) / Speed-up (Days)">
                <input id="password" type="password" placeholder="비밀번호(취소용) / Cancel Password">
            </div>
            <div class="buttonRow">
                <button type="button" onclick="confirmBooking()" class="btn-primary">예약 확정 / Confirm</button>
                <button type="button" onclick="closeModal()" class="btn-secondary">닫기 / Close</button>
            </div>
        </div>
    </div>

    <!-- 예약 현황 모달 -->
    <div id="reservedModal" class="modal">
        <div class="modalBox">
            <h3>예약 현황 / Booking Status</h3>
            <div id="reservedSlotInfo" style="margin-bottom:10px; font-weight:bold;"></div>
            <div id="attendeeListDetail" class="attendeeListDetail" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
            <hr>
            <div class="cancelArea">
                <p style="font-size:12px; margin:10px 0 5px;">취소 비밀번호 입력 / Password to Cancel</p>
                <input id="editPassword" type="password" placeholder="Password">
                <div class="buttonRow">
                    <button type="button" onclick="confirmCancel()" class="btn-danger">취소하기 / Cancel</button>
                    <button type="button" onclick="openReserveFromStatus()" class="btn-primary">추가 예약 / Add More</button>
                </div>
            </div>
            <button type="button" onclick="closeReservedModal()" class="btn-secondary" style="width:100%; margin-top:10px;">닫기 / Close</button>
        </div>
    </div>

    <!-- 라이브러리 및 스크립트 (순서 중요) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
