<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>2737 SVS Booking</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="snow"></canvas>

<header>

<h1>❄ 2737 SVS Booking</h1>

<div id="countdown"></div>

</header>

<div class="tabs">

<button onclick="switchBuff('monday')">
Monday (Construction)
</button>

<button onclick="switchBuff('tuesday')">
Tuesday (Research)
</button>

<button onclick="switchBuff('thursday')">
Thursday (Training)
</button>

</div>

<div id="slots" class="grid"></div>

<h2>Alliance Usage</h2>

<div id="stats"></div>

<div id="modal" class="modal">

<div class="modalBox">

<h3>Reserve Slot</h3>

<input id="alliance" placeholder="Alliance">

<input id="player" placeholder="Player Name">

<input id="password" type="password" placeholder="Cancel Password">

<button onclick="confirmBooking()">Confirm Reservation</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script src="app.js"></script>

</body>
</html>
