<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2737 SVS Booking</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <canvas id="snow"></canvas>
    
    <header>
        <div class="headerTop">
            <div class="titleArea">
                <h1 id="mainTitle"><span id="snowSecret">❄</span> 2737 SVS Booking</h1>
                <div id="countdown" class="countdown"></div>
            </div>
            <div class="headerToolbar">
                <select id="langSelect" onchange="window.changeLanguage(this.value)">
                    <option value="ko">🇰🇷 한국어</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="zh">🇨🇳 中文(简体)</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="id">🇮🇩 Indonesia</option>
                </select>
                <div class="filterGroup">
                    <select id="filterStatus" onchange="window.renderAll()">
                        <option value="all" id="opt-all">All</option>
                        <option value="mine" id="opt-mine">My Booking</option>
                    </select>
                    <button type="button" class="btn-reset" id="btn-reset-txt" onclick="window.clearSearch()">Reset</button>
                </div>
            </div>
        </div>
        
        <div class="creatorBadge">
            <div class="profile-wrapper">
                <svg viewBox="0 0 400 140" class="curved-text-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                    <path id="finalCurve" d="M 40,120 A 160,120 0 0,1 360,120" fill="transparent"></path>
                    <text>
                        <textPath xlink:href="#finalCurve" href="#finalCurve" startOffset="50%" text-anchor="middle" id="curved-profile-txt">
                            The website usage fee is Mona's Island 💚+1
                        </textPath>
                    </text>
                </svg>
                <img src="creator-dino.png" alt="Creator" class="creatorAvatar" onclick="window.handleAdminAccess()">
            </div>
            <div class="creatorCredit">[ZTP] Mona (X:697 Y:445)</div>
            
            <div id="myConfirmedSection" class="confirmedSection" style="display: none;">
                <div class="confirmedHeader" id="confirmed-header-txt">👑 My Confirmed Buffs</div>
                <div id="confirmedList" class="confirmedList"></div>
            </div>

            <div class="ministerNotice">
                <div id="notice-dynamic-txt" class="notice-ko">Please book all available time slots you can attend.</div>
            </div>
        </div>
    </header>

    <div class="tabs">
        <div id="tab-monday" class="tab-item" onclick="window.switchBuff('monday')">
            <div class="tabTitle" id="tab-mon-txt">Monday</div>
            <div id="cd-monday" class="tabCD"></div>
        </div>
        <div id="tab-tuesday" class="tab-item" onclick="window.switchBuff('tuesday')">
            <div class="tabTitle" id="tab-tue-txt">Tuesday</div>
            <div id="cd-tuesday" class="tabCD"></div>
        </div>
        <div id="tab-thursday" class="tab-item" onclick="window.switchBuff('thursday')">
            <div class="tabTitle" id="tab-thu-txt">Thursday</div>
            <div id="cd-thursday" class="tabCD"></div>
        </div>
    </div>
    
    <div id="bookingStatusMsg" style="font-weight: 800; margin-bottom: 10px; color: #2d3748;"></div>
    
    <main>
        <div id="slots" class="grid"></div>
    </main>

    <div id="modal" class="modal">
        <div class="modalBox">
            <h3 id="modal-title-txt">New Booking</h3>
            <div id="selectedSlotInfo" style="margin-bottom:10px; font-weight:800; color:#1976d2;"></div>
            <div class="inputGroup">
                <input id="alliance" type="text" placeholder="Alliance">
                <input id="player" type="text" placeholder="Nickname">
                <input id="playerId" type="text" placeholder="Player ID (9 digits)" maxlength="9">
                <input id="daysSaved" type="number" placeholder="Speed-up Days">
                <input id="cancelKey" type="text" class="mask-input" placeholder="Password for cancel" autocomplete="off">
            </div>
            <div class="buttonRow">
                <button type="button" onclick="window.confirmBooking()" class="btn-primary" id="btn-confirm-txt">Confirm</button>
            </div>
            <button type="button" onclick="window.closeModal()" class="btn-close-full" id="btn-close-txt">Close</button>
        </div>
    </div>

    <div id="reservedModal" class="modal">
        <div class="modalBox">
            <h3 id="res-title-txt">Booking Status</h3>
            <div id="reservedSlotInfo" style="margin-bottom:15px; font-weight:800;"></div>
            <div id="attendeeListDetail" style="margin-bottom: 20px;"></div>
            <hr>
            <div class="cancelArea">
                <p style="font-size:13px; font-weight:800; margin
