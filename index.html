<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2737 SVS Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="snow"></canvas>
    <header>
        <h1><span id="snowSecret">❄</span> 2737 SVS Booking</h1>
        <div id="countdown" class="countdown"></div>
        <div class="creatorBadge">
            <img src="creator-dino.png" alt="Creator" class="creatorAvatar">
            <div class="creatorCredit">[ZTP] Mona (X:697 Y:445)</div>
        </div>
        <div class="headerToolbar">
            <input id="searchInput" type="text" placeholder="연맹 또는 닉네임 검색">
            <select id="filterStatus" onchange="renderAll()">
                <option value="all">전체 보기</option>
                <option value="mine">내 예약 확인</option>
            </select>
        </div>
    </header>

    <section class="tabsWrap">
        <div class="tabs">
            <button type="button" id="tab-monday" onclick="switchBuff('monday')">월요일 (건설)</button>
            <button type="button" id="tab-tuesday" onclick="switchBuff('tuesday')">화요일 (연구)</button>
            <button type="button" id="tab-thursday" onclick="switchBuff('thursday')">목요일 (훈련)</button>
        </div>
        <div id="bookingStatusMsg" class="bookingStatusMsgHighlight"></div>
    </section>

    <main><div id="slots" class="grid"></div></main>

    <div id="modal" class="modal">
        <div class="modalBox">
            <h3>새 예약 추가</h3>
            <div id="selectedSlotInfo" style="margin-bottom:10px; font-weight:bold; color:#2d3748;"></div>
            <div class="inputGroup">
                <input id="alliance" type="text" placeholder="연맹명 (예: ZTP)">
                <input id="player" type="text" placeholder="닉네임">
                <input id="playerId" type="text" placeholder="ID (숫자 9자리)" maxlength="9">
                <input id="daysSaved" type="number" placeholder="사용 가속(일)">
                <input id="password" type="password" placeholder="비밀번호(취소용)">
            </div>
            <div class="buttonRow">
                <button type="button" onclick="confirmBooking()" class="btn-primary">예약 확정</button>
                <button type="button" onclick="closeModal()" class="btn-secondary">닫기</button>
            </div>
        </div>
    </div>

    <div id="reservedModal" class="modal">
        <div class="modalBox">
            <h3>예약 현황</h3>
            <div id="reservedSlotInfo" style="margin-bottom:10px; font-weight:bold;"></div>
            <div id="attendeeListDetail" class="attendeeListDetail" style="max-height:200px; overflow-y:auto; margin-bottom:15px;"></div>
            <hr>
            <div class="cancelArea">
                <p style="font-size:12px; margin:10px 0 5px;">취소 비밀번호 입력</p>
                <input id="editPassword" type="password" placeholder="비밀번호" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px; box-sizing:border-box;">
                <div class="buttonRow">
                    <button type="button" onclick="confirmCancel()" class="btn-danger">취소하기</button>
                    <button type="button" onclick="openReserveFromStatus()" class="btn-primary">추가 예약</button>
                </div>
            </div>
            <button type="button" onclick="closeReservedModal()" class="btn-secondary" style="width:100%; margin-top:10px;">닫기</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
