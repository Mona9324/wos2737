<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2737 SVS Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="snow"></canvas>
    <header>
        <h1><span id="snowSecret">❄</span> 2737 SVS Booking</h1>
        <div id="countdown" class="countdown"></div>
        <div class="creatorBadge">
            <img src="creator-dino.png" alt="Creator" class="creatorAvatar">
            <div class="creatorCredit">[ZTP] Mona (X:697 Y:445)</div>
        </div>
        <div class="headerToolbar">
            <input id="searchInput" type="text" placeholder="연맹 또는 닉네임 검색">
            <select id="filterStatus" onchange="renderAll()">
                <option value="all">전체 보기 / View All</option>
                <option value="mine">내 예약 확인 / My Booking</option>
            </select>
            <button type="button" onclick="clearSearch()">초기화 / Reset</button>
        </div>
    </header>

    <section class="tabsWrap">
        <div class="tabs">
            <button type="button" id="tab-monday" onclick="switchBuff('monday')">월요일 (건설버프) / Monday</button>
            <button type="button" id="tab-tuesday" onclick="switchBuff('tuesday')">화요일 (연구버프) / Tuesday</button>
            <button type="button" id="tab-thursday" onclick="switchBuff('thursday')">목요일 (병사훈련버프) / Thursday</button>
        </div>
        <div id="bookingStatusMsg" class="bookingStatusMsgHighlight"></div>
    </section>

    <main><div id="slots" class="grid"></div></main>

    <!-- 새 예약 추가 모달 -->
    <div id="modal" class="modal">
        <div class="modalBox">
            <h3>새 예약 추가 / New Booking</h3>
            <div id="selectedSlotInfo" class="selectedSlotInfo"></div>
            <div class="inputGroup">
                <input id="alliance" type="text" placeholder="연맹명 / Alliance">
                <input id="player" type="text" placeholder="닉네임 / Nickname">
                <input id="playerId" type="text" placeholder="ID (숫자 9개)" maxlength="9">
                <input id="daysSaved" type="number" placeholder="사용 가속(일)">
                <input id="password" type="password" placeholder="비밀번호(취소용)">
            </div>
            <div class="modalButtons">
                <button type="button" onclick="confirmBooking()" class="btn-primary">예약 확정 / Confirm</button>
                <button type="button" onclick="closeModal()" class="btn-secondary">닫기 / Close</button>
            </div>
        </div>
    </div>

    <!-- 예약 현황 모달 -->
    <div id="reservedModal" class="modal">
        <div class="modalBox">
            <h3>예약 현황 / Booking Status</h3>
            <div id="reservedSlotInfo" class="selectedSlotInfo"></div>
            <div id="attendeeListDetail" class="attendeeListDetail"></div>
            <hr>
            <div class="cancelArea">
                <p>예약 취소 비밀번호 입력</p>
                <input id="editPassword" type="password" placeholder="비밀번호">
                <div class="buttonRow">
                    <button type="button" onclick="confirmCancel()" class="btn-danger">예약 취소</button>
                    <button type="button" onclick="openReserveModalFromStatus()" class="btn-primary">추가 예약</button>
                </div>
            </div>
            <button type="button" onclick="closeReservedModal()" class="btn-secondary" style="width:100%; margin-top:10px;">닫기 / Close</button>
        </div>
    </div>

    <!-- 관리자 패널 -->
    <div id="adminPanel" class="adminPanel">
        <button type="button" class="adminCloseBtn" onclick="closeAdmin()">×</button>
        <div class="adminHeader"><h3>Admin System</h3></div>
        <div class="adminBody">
            <div class="adminSection">
                <h4>SvS 기준일 설정</h4>
                <div class="adminInputRow">
                    <input id="adminBaseDate" type="datetime-local">
                    <button onclick="saveAdminBaseDate()" class="adminBtn excel">저장</button>
                </div>
            </div>
            <div class="adminSection">
                <h4>예약 On/Off 제어</h4>
                <div class="adminButtonGroup">
                    <button onclick="toggleTabStatus('monday')" class="adminBtn">월요일</button>
                    <button onclick="toggleTabStatus('tuesday')" class="adminBtn">화요일</button>
                    <button onclick="toggleTabStatus('thursday')" class="adminBtn">목요일</button>
                </div>
            </div>
            <div class="adminSection">
                <h4>시스템 로그</h4>
                <div id="logsBox" class="logsBox"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
