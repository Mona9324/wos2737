<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2737 SVS Booking</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="snow"></canvas>

<header>
  <h1>❄ 2737 SVS Booking</h1>
  <div id="countdown"></div>
  <div class="slotStats">
    <span class="availableDot"></span> <span id="availableCount">Available 0</span>
    <span class="reservedDot"></span> <span id="reservedCount">Reserved 0</span>
  </div>
  <div id="rankingBox"></div>
</header>

<div class="tabs">
  <button onclick="switchBuff('monday')">Monday (Construction)</button>
  <button onclick="switchBuff('tuesday')">Tuesday (Research)</button>
  <button onclick="switchBuff('thursday')">Thursday (Troop Training)</button>
</div>

<div id="slots" class="grid"></div>

<!-- 예약 모달 -->
<div id="modal" class="modal">
  <div class="modalBox">
    <h3>Reserve Slot</h3>
    <input id="alliance" placeholder="Alliance">
    <input id="player" placeholder="Player">
    <input id="daysSaved" type="number" placeholder="Days Saved">
    <input id="password" type="password" placeholder="Cancel Password">
    <button onclick="confirmBooking()">Reserve</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- 취소 모달 -->
<div id="cancelModal" class="modal">
  <div class="modalBox">
    <h3>Cancel Reservation</h3>
    <input id="cancelPassword" type="password" placeholder="Password">
    <button onclick="confirmCancel()">Cancel Reservation</button>
    <button onclick="closeCancelModal()">Close</button>
  </div>
</div>

<!-- Admin -->
<button class="adminFloating" onclick="openAdmin()">⚙ Admin</button>
<div id="adminPanel" class="adminPanel">
  <h3>관리자 패널</h3>
  <div id="adminLogin">
    <input id="adminPass" type="password" placeholder="관리자 비밀번호">
    <button onclick="adminLogin()">로그인</button>
  </div>
  <div id="adminControls">
    <button onclick="setBooking(true)">예약 열기</button>
    <button onclick="setBooking(false)">예약 잠금</button>
    <button onclick="clearAll()">전체 예약 삭제</button>
  </div>
  <button onclick="closeAdmin()">닫기</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
