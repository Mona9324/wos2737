<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2737 SVS Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="snow"></canvas>
    <header>
        <h1><span id="snowSecret">❄</span> 2737 SVS Booking</h1>
        <div id="countdown" class="countdown"></div>
        <div class="creatorBadge">
            <img src="creator-dino.png" alt="Creator" class="creatorAvatar" onclick="handleAdminAccess()">
            <div class="creatorCredit">[ZTP] Mona (X:697 Y:445)</div>
        </div>
        <div class="headerToolbar">
            <input id="searchInput" type="text" placeholder="연맹 또는 닉네임 검색 / Search" oninput="renderAll()">
            <select id="filterStatus" onchange="renderAll()">
                <option value="all">전체 보기 / View All</option>
                <option value="mine">내 예약 / My Booking</option>
            </select>
            <button type="button" onclick="clearSearch()" style="padding:10px; border-radius:8px; border:1px solid #ddd; background:#fff; cursor:pointer;">Reset</button>
        </div>
    </header>

    <div class="tabs">
        <button type="button" id="tab-monday" onclick="switchBuff('monday')">월요일 (건설) / Monday (Construction Buff)</button>
        <button type="button" id="tab-tuesday" onclick="switchBuff('tuesday')">화요일 (연구) / Tuesday (Research Buff)</button>
        <button type="button" id="tab-thursday" onclick="switchBuff('thursday')">목요일 (훈련) / Thursday (Troops Training Buff)</button>
    </div>
    <div id="bookingStatusMsg" style="font-weight: 800; margin-bottom: 20px;"></div>

    <main><div id="slots" class="grid"></div></main>

    <!-- 예약 신청 모달 -->
    <div id="modal" class="modal">
        <div class="modalBox">
            <h3>새 예약 추가 / New Booking</h3>
            <div id="selectedSlotInfo" style="margin-bottom:15px; font-weight:800; color:#1976d2;"></div>
            <div class="inputGroup">
                <input id="alliance" type="text" placeholder="연맹명 / Alliance">
                <input id="player" type="text" placeholder="닉네임 / Nickname">
                <input id="playerId" type="text" placeholder="ID (9자리)" maxlength="9">
                <input id="daysSaved" type="number" placeholder="사용 가속(일)">
                <input id="password" type="password" placeholder="비밀번호(취소용)">
            </div>
            <div class="buttonRow">
                <button type="button" onclick="confirmBooking()" class="btn-primary">예약 확정 / Confirm</button>
            </div>
            <button type="button" onclick="closeModal()" class="btn-close-full">닫기 / Close</button>
        </div>
    </div>

    <!-- 예약 현황 모달 -->
    <div id="reservedModal" class="modal">
        <div class="modalBox">
            <h3>예약 현황 / Status</h3>
            <div id="reservedSlotInfo" style="margin-bottom:15px; font-weight:800;"></div>
            <div id="attendeeListDetail" style="margin-bottom: 20px;"></div>
            <hr>
            <div class="cancelArea" style="margin-top:20px;">
                <p style="font-size:13px; font-weight:800; margin-bottom:8px;">취소 비밀번호 입력 / Password</p>
                <input id="editPassword" type="password" placeholder="Password">
                <div class="buttonRow">
                    <button type="button" onclick="confirmCancel()" class="btn-danger">취소하기 / Cancel</button>
                    <button type="button" onclick="openReserveFromStatus()" class="btn-primary">추가 예약 / Add More</button>
                </div>
            </div>
            <button type="button" onclick="closeReservedModal()" class="btn-close-full">닫기 / Close</button>
        </div>
    </div>

    <!-- 관리자 패널 -->
    <div id="adminPanel" class="modal">
        <div class="modalBox" style="max-width: 550px;">
            <h3>관리자 시스템 / Admin System</h3>
            <div class="adminSection">
                <p style="font-size:13px; font-weight:800;">SVS 기준일 설정 / Base Date</p>
                <div class="buttonRow">
                    <input id="adminBaseDate" type="datetime-local" style="flex:2; padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <button type="button" onclick="saveAdminBaseDate()" class="btn-primary" style="flex:1;">저장</button>
                </div>
            </div>
            <div class="adminSection">
                <p style="font-size:13px; font-weight:800;">요일별 제어 / Day Control</p>
                <div class="buttonRow">
                    <button type="button" onclick="toggleTabStatus('monday')" id="btn-admin-monday" class="btn-primary">Mon</button>
                    <button type="button" onclick="toggleTabStatus('tuesday')" id="btn-admin-tuesday" class="btn-primary">Tue</button>
                    <button type="button" onclick="toggleTabStatus('thursday')" id="btn-admin-thursday" class="btn-primary">Thu</button>
                </div>
                <div class="buttonRow" style="margin-top:10px;">
                    <button type="button" onclick="toggleAllTabs(true)" class="btn-primary">전체 열기</button>
                    <button type="button" onclick="toggleAllTabs(false)" class="btn-danger">전체 닫기</button>
                </div>
            </div>
            <div class="adminSection">
                <p style="font-size:13px; font-weight:800;">데이터 관리 / Data</p>
                <div class="buttonRow">
                    <button type="button" onclick="exportAllCSV()" class="btn-primary" style="background:#e8f5e9; color:#2e7d32;">엑셀 추출</button>
                    <button type="button" onclick="backupAndClearAll()" class="btn-danger">전체 삭제</button>
                </div>
            </div>
            <div id="logsBox" class="logsBox"></div>
            <button type="button" onclick="closeAdmin()" class="btn-close-full">닫기 / Close</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
